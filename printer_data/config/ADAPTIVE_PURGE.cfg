





[gcode_macro ADAPTIVE_PURGE]
description: Adaptive purge tuned for PLA-MAX
gcode:
    {% set purge_len = 75 %}
    {% set purge_speed = 300 %}
    {% set z_height = 0.28 %}
    {% set purge_amount = 20 %}

    G90
    M83

    G1 Z10 F3000
    G1 X5 Y5 F15000
    G1 Z{z_height} F3000

    G92 E0

    # First purge line
    G1 X{purge_len} E{purge_amount} F{purge_speed}

    # Second purge line (very important for PLA-MAX)
    G1 Y7 F15000
    G1 X5 E{purge_amount} F{purge_speed}

    G1 Z5 F3000