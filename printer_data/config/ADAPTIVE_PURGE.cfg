





[gcode_macro ADAPTIVE_PURGE]
description: Smart line purge based on nozzle size
gcode:
    {% set purge_len = 60 %}
    {% set purge_speed = 300 %}
    {% set z_height = 0.3 %}

    G90
    M83

    G1 Z10 F3000
    G1 X5 Y5 F15000
    G1 Z{z_height} F3000

    G1 X{purge_len} E6 F{purge_speed}
    G1 X{purge_len + 10} F15000

    G1 Z5 F3000