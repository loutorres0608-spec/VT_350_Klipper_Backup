
# This file contains common pin mappings for the BIGTREETECH EBBCan
# Canbus board. To use this config, the firmware should be compiled for the
# RP2040 with "USB" or "CAN bus (on gpio4/gpio5)".
# The "EBB Can" micro-controller will be used to control the components on the nozzle.

# See docs/Config_Reference.md for a description of parameters.

[mcu EBBCan]
#serial: /dev/serial/by-id/usb-Klipper_Klipper_firmware_12345-if00
canbus_uuid: 71f2ba91b8a7

[temperature_sensor EBB_NTC]
sensor_type: Generic 3950
sensor_pin: EBBCan:gpio28

[adxl345]
cs_pin: EBBCan:gpio1
spi_software_sclk_pin: EBBCan:gpio2
spi_software_mosi_pin: EBBCan:gpio0
spi_software_miso_pin: EBBCan:gpio3
axes_map: z,-y,x

[resonance_tester]
probe_points: 175, 175, 20
accel_chip: adxl345

##  Update value below when you perform extruder calibration
##  If you ask for 100mm of filament, but in reality it is 98mm:
##  rotation_distance = <previous_rotation_distance> * <actual_extrude_distance> / 100
##  22.6789511 is a good starting point
#rotation_distance:12.95391097462756  #Bondtech 5mm Drive Gears
##  Update Gear Ratio depending on your Extruder Type
##  Use 50:10 for Stealthburner/Clockwork 2
##  Use 50:17 for Afterburner/Clockwork (BMG Gear Ratio)
##  Use 80:20 for M4, M3.1
#gear_ratio: 50:10
#microsteps: 32
#full_steps_per_rotation: 200    #200 for 1.8 degree, 400 for 0.9 degree

#[Galileo 2 extruder Settings]
#rotation_distance: 47.088
#gear_ratio: 9:1
#microsteps: 16
#[tmc2209 extruder]
#run_current: 0.6

#[Clockwork 2 Extruder Settings]
#gear_ratio: 50:17 
#microsteps: 32
#rotation_distance: 12.95391097462756  ## Working good on test cube with Super Slicer default settings

[extruder]
step_pin: EBBCan:gpio18
dir_pin: EBBCan:gpio19
enable_pin: !EBBCan:gpio17
gear_ratio: 9:1 
microsteps: 16
rotation_distance: 47.088 #Default estep=47.088
max_extrude_cross_section: 5
max_extrude_only_distance: 200
nozzle_diameter: 0.400
filament_diameter: 1.750
heater_pin: EBBCan:gpio7
sensor_type: Generic 3950 #MAX31865
sensor_pin: EBBCan:gpio27
control: pid
pid_Kp: 17.560
pid_Ki: 0.494
pid_Kd: 104.596
min_extrude_temp: 180
min_temp: 0
max_temp: 285
pressure_advance: 0.057

##sensor_type: MAX31865
##sensor_pin: EBBCan:gpio9
##spi_software_sclk_pin: EBBCan:gpio10
##spi_software_mosi_pin: EBBCan:gpio8
##spi_software_miso_pin: EBBCan:gpio11
##rtd_nominal_r: 100
#rtd_reference_r: 430
##rtd_num_of_wires: 2

[tmc2209 extruder]
uart_pin: EBBCan:gpio20
run_current: 0.85       #0.650
sense_resistor: 0.110
stealthchop_threshold: 0    #999999

#[filament_switch_sensor my_sensor] ## had to disable causing problems with homing operations.
#pause_on_runout: True
#event_delay: 10.0
#pause_delay: 5.5
#switch_pin: !EBBCan:gpio21
#runout_gcode:
    #PARK_MACRO
    #M117 Out of Filament
#insert_gcode:
    #M117 Resuming
    #RESUME_MACRO
    
[fan] ## Part Cooling Fan
pin: EBBCan:gpio13
#kick_start_time: 0.8
max_power: 1.0
#cycle_time: 0.010
#shutdown_speed: 0.0
#off_below: 0.0

[heater_fan hotend_fan]
pin: EBBCan:gpio14
heater: extruder
heater_temp: 50.0

[autotune_tmc extruder]
motor: ldo-36sth20-1004ahg
tuning_goal: auto

#[X_Endstop]
#pin: EBBCan:gpio24

#[neopixel hotend_rgb]
#pin: EBBCan:gpio16

