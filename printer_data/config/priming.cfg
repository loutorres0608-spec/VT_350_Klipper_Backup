[gcode_macro PRIMING]
description: Prime nozzle and wipe into pellet bin
variable_purge_x: 15
variable_purge_y: 5
variable_wipe_start_y: 63
variable_prime_z: 0.30
variable_prime_e: 18
variable_purge_e1: 10
variable_purge_e2: 6
variable_purge_e3: 3

gcode:
    {% if "xyz" not in printer.toolhead.homed_axes %}
        { action_raise_error("Please home your axes before running PRIMING!") }
    {% endif %}

    {% if printer.extruder.temperature < 170 %}
        { action_raise_error("Hotend is not hot enough to prime!") }
    {% endif %}

    SAVE_GCODE_STATE NAME=PRIMING_STATE
    SET_DISPLAY_TEXT MSG="Priming nozzle"
    M117 Priming nozzle

    M400
    G90                         ; absolute XYZ
    M83                         ; relative extrusion
    M107                        ; fan off to start

    CLEAN

    G1 Z10 F3000
    G1 X{purge_x} Y{purge_y} F15000
    G1 Z{prime_z} F1200

    ; Prime in controlled stages
    G1 E{prime_e} F300          ; 18mm at 5 mm/s
    G1 Z2.0 E{purge_e1} F600
    G1 Z4.0 E{purge_e2} F900
    G1 Z2.0 E{purge_e3} F1200
    G1 E-0.5 F2400

    ; Move to wipe area
    G91
    G1 Z10 F3000
    G1 Y{wipe_start_y} Z-18.25 F3000
    M106 S255                   ; optional: helps pellet release in your setup

    ; Wipe passes
    G1 Y10 F4000
    G1 Y-10 F4000
    G1 Y10 F4000
    G1 Y-10 F4000
    G1 Y-{wipe_start_y} F5000

    M107
    G1 Z2 F3000
    G1 Y{wipe_start_y} F7000

    G90
    G92 E0
    SET_DISPLAY_TEXT MSG="Priming complete"
    M117 Priming complete
    RESTORE_GCODE_STATE NAME=PRIMING_STATE
    #------------------------------------------------------------------------

[gcode_macro CLEAN]
description: Knock off debris before priming
gcode:
    SAVE_GCODE_STATE NAME=CLEAN_STATE
    G90
    M204 S6000
    G1 X15 Y35 F15000
    G1 Z0.5 F4000
    G1 Y1 F10000
    RESTORE_GCODE_STATE NAME=CLEAN_STATE
    
    #--------------------------------------------------------------------------


   ## Save the gcode state in this macro instance.
     SET_DISPLAY_TEXT MSG="Priming completed and the poop bin filled"             # Displays info
      M117 Priming completed                           
     
    
      ## Restore the gcode state to how it was before the macro.
      RESTORE_GCODE_STATE NAME=priming
