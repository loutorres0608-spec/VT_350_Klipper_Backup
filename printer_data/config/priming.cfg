[gcode_macro PRIMING]
gcode:
    {% if "xyz" not in printer.toolhead.homed_axes %}
        { action_raise_error("Please home your axes!") }
    {% endif %}

    SAVE_GCODE_STATE NAME=PRIMING_STATE

    SET_DISPLAY_TEXT MSG="Priming nozzle"
    M117 Priming

    G90
    M83

    CLEAN

    ; move to purge
    G1 Z10 F1800
    G1 X15 Y5 F6000
    G1 Z0.30 F600

    ; purge slower
    G1 E15 F180
    G1 Z1.0 E10 F240
    G1 Z2.0 E8 F360
    G1 Z4.0 E5 F480
    G1 E-0.5 F1200

    ; move to wipe zone slower
    G1 Z10 F1800
    G1 X15 Y68 F5000
    G1 Z2.0 F600

    ; wipe passes slower
    G1 Y58 F1800
    G1 Y68 F1800
    G1 Y58 F1800
    G1 Y68 F1800

    G1 Z10 F1800
    G92 E0

    SET_DISPLAY_TEXT MSG="Priming completed"
    M117 Priming completed

    RESTORE_GCODE_STATE NAME=PRIMING_STATE
    
[gcode_macro CLEAN]
gcode:
    SAVE_GCODE_STATE NAME=CLEAN_STATE
    G90
    M204 S3000

    G1 Z10 F1800
    G1 X15 Y35 F6000
    G1 Z0.30 F600

    ; knock debris forward slower
    G1 Y1 F3000
    G1 Y8 F1800
    G1 Y1 F3000
    G1 Y8 F1800
    G1 Y1 F3000

    G1 Z2 F1200
    RESTORE_GCODE_STATE NAME=CLEAN_STATE