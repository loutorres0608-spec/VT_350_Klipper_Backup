[gcode_macro LINE_PURGE]
description: Adaptive line purge near print area with safer bounds and fallback behavior
gcode:
    {% set travel_speed = (printer.toolhead.max_velocity * 60)|float %}
    {% set z_max = printer.toolhead.axis_maximum.z|float %}
    {% set x_max = printer.toolhead.axis_maximum.x|float %}
    {% set y_max = printer.toolhead.axis_maximum.y|float %}
    {% set cross_section = printer.configfile.settings.extruder.max_extrude_cross_section|default(5)|float %}

    {% set verbose_enable = printer["gcode_macro _KAMP_Settings"].verbose_enable|default(0)|int %}
    {% set purge_height = printer["gcode_macro _KAMP_Settings"].purge_height|default(0.35)|float %}
    {% set tip_distance = printer["gcode_macro _KAMP_Settings"].tip_distance|default(0.5)|float %}
    {% set purge_margin = printer["gcode_macro _KAMP_Settings"].purge_margin|default(10)|float %}
    {% set purge_amount = printer["gcode_macro _KAMP_Settings"].purge_amount|default(15)|float %}
    {% set flow_rate = printer["gcode_macro _KAMP_Settings"].flow_rate|default(6)|float %}

    {% set purge_move_speed = ((flow_rate / 5.0) * 60)|float %}
    {% set z_hop = [purge_height * 2, 2.0]|max %}

    {% if "xyz" not in printer.toolhead.homed_axes %}
        { action_raise_error("Please home printer before LINE_PURGE") }
    {% endif %}

    {% if printer.extruder.temperature < 170 %}
        { action_raise_error("Hotend not hot enough for LINE_PURGE") }
    {% endif %}

    {% if printer.exclude_object is defined and printer.exclude_object.objects|length > 0 %}
        {% set all_points = printer.exclude_object.objects | map(attribute='polygon') | sum(start=[]) %}
        {% set obj_x_min = all_points | map(attribute=0) | min %}
        {% set obj_x_max = all_points | map(attribute=0) | max %}
        {% set obj_y_min = all_points | map(attribute=1) | min %}
        {% set obj_y_max = all_points | map(attribute=1) | max %}
    {% else %}
        ; Fallback if exclude_object data is unavailable
        {% set obj_x_min = 0.0 %}
        {% set obj_x_max = 0.0 %}
        {% set obj_y_min = 0.0 %}
        {% set obj_y_max = 0.0 %}
    {% endif %}

    ; Preferred orientation:
    ; If there is room in front of the object, purge along X.
    ; Otherwise purge along Y on the left side.
    {% set raw_x_center = ((obj_x_min + obj_x_max) / 2.0) - (purge_amount / 2.0) %}
    {% set raw_y_center = ((obj_y_min + obj_y_max) / 2.0) - (purge_amount / 2.0) %}

    {% set purge_x_center = [[raw_x_center, 2.0]|max, x_max - purge_amount - 2.0]|min %}
    {% set purge_y_center = [[raw_y_center, 2.0]|max, y_max - purge_amount - 2.0]|min %}

    {% set purge_x_origin = [[obj_x_min - purge_margin, 2.0]|max, x_max - 2.0]|min %}
    {% set purge_y_origin = [[obj_y_min - purge_margin, 2.0]|max, y_max - 2.0]|min %}

    {% set use_front_purge = (obj_y_min - purge_margin) > 2.0 %}

    {% if cross_section < 5 %}
        { action_respond_info("[LINE_PURGE] max_extrude_cross_section is below 5. Purge skipped.") }
    {% else %}
        {% if verbose_enable %}
            { action_respond_info("[LINE_PURGE] start: X/Y mode=" ~ ("front-X" if use_front_purge else "left-Y")) }
        {% endif %}

        SAVE_GCODE_STATE NAME=LINE_PURGE_STATE
        G92 E0
        G90
        M83

        ; Safe Z move first
        G0 Z{ [printer.toolhead.position.z + 2.0, z_hop]|min if printer.toolhead.position.z < z_hop else z_hop } F1800

        {% if use_front_purge %}
            G0 X{purge_x_center} Y{purge_y_origin} F{travel_speed}
            G0 Z{purge_height} F900

            ; optional tip advance
            G1 E{tip_distance} F{purge_move_speed}
            G1 X{purge_x_center + purge_amount} E{purge_amount} F{purge_move_speed}

            {% if printer.firmware_retraction is defined %}
                G10
            {% else %}
                G1 E-0.6 F1800
            {% endif %}

            ; short string-break move
            G0 X{ [purge_x_center + purge_amount + 6.0, x_max - 2.0]|min } F{travel_speed}

        {% else %}
            G0 X{purge_x_origin} Y{purge_y_center} F{travel_speed}
            G0 Z{purge_height} F900

            ; optional tip advance
            G1 E{tip_distance} F{purge_move_speed}
            G1 Y{purge_y_center + purge_amount} E{purge_amount} F{purge_move_speed}

            {% if printer.firmware_retraction is defined %}
                G10
            {% else %}
                G1 E-0.6 F1800
            {% endif %}

            ; short string-break move
            G0 Y{ [purge_y_center + purge_amount + 6.0, y_max - 2.0]|min } F{travel_speed}
        {% endif %}

        G92 E0
        G0 Z{ [purge_height + 2.0, z_max]|min } F1800
        RESTORE_GCODE_STATE NAME=LINE_PURGE_STATE
    {% endif %}