#####################################################################
#   Fan Control
#####################################################################

[heater_fan Rear_Exhaust_fan]
## Exhaust fan - FAN4 ## Cabient filter exhaust fan
## Adjust if you use a different board or a different terminal.
pin: PD14
max_power: 0.8
shutdown_speed: 0.0
kick_start_time: 5.0
heater: heater_bed
heater_temp: 60
fan_speed: 1.0

[fan_generic Nevermore_fan]
##  Exhaust Fan - FAN1 Nevermore
##  If you are experiencing back flow, you can reduce fan_speed
pin: PA8


[controller_fan Bottom_Skirt_fan_1]
##  Controller fan - FAN2
pin: PD12
kick_start_time: 0.5
heater: heater_bed

[heater_fan Bottom_Skirt_fan_2]
##  Exhaust fan - FAN3
pin: PD13
max_power: 1.0
shutdown_speed: 0.0
kick_start_time: 5.0
heater: heater_bed
heater_temp: 50
fan_speed: 1.0


#####################################################################
#   LED Control
#####################################################################

[output_pin caselight]
# Chamber Lighting - HE2 Connector (Optional)
##Octopus 1.0 & 1.1, Octopus PRO 1.0
#pin: PB10
##Octopus PRO 1.1
pin: PB0
pwm:true
shutdown_value: 0
value:1
cycle_time: 0.01

#####################################################################
#   Homing and Gantry Adjustment Routines
#####################################################################

[idle_timeout]
timeout: 1800

[safe_z_home]
##  XY Location of the Z Endstop Switch
##  Update -10,-10 to the XY coordinates of your endstop pin 
##  (such as 157,305) after going through Z Endstop Pin
##  Location Definition step.
